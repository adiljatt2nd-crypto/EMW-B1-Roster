<style>
:root {
  --maroon:       #6b0f1a;
  --maroon-deep:  #4a0a12;
  --maroon-mid:   #8b1a28;
  --maroon-light: #b03045;
  --maroon-pale:  #f5e8ea;
  --maroon-tint:  #fdf0f2;
  --gold:         #c9963a;
  --gold-light:   #e8b95a;
  --white:        #ffffff;
  --off-white:    #fafafa;
  --border:       #e2c8cb;
  --border-strong:#c9a0a6;
  --text-dark:    #2a0a10;
  --text-mid:     #6b2030;
  --text-muted:   #9a6070;
  --shadow-sm:    0 2px 8px rgba(107,15,26,.10);
  --shadow-md:    0 6px 24px rgba(107,15,26,.14);
  --shadow-lg:    0 16px 48px rgba(107,15,26,.18);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--off-white);color:var(--text-dark);min-height:100vh;}

/* ── HEADER ── */
.site-header{background:var(--maroon-deep);position:relative;overflow:hidden;}
.site-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 10% 50%,rgba(201,150,58,.18) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 90% 20%,rgba(201,150,58,.12) 0%,transparent 60%);}
.site-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold) 0%,var(--gold-light) 50%,var(--gold) 100%);}
.header-inner{position:relative;z-index:1;display:flex;align-items:center;gap:24px;padding:22px 40px 26px;max-width:1200px;margin:0 auto;}
.header-logo{flex-shrink:0;width:88px;height:88px;border-radius:50%;background:#fff;border:3px solid rgba(201,150,58,.6);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(107,15,26,.15);}
.header-logo img{width:80px;height:80px;object-fit:contain;}
.header-text{flex:1;}
.header-institution{font-family:'EB Garamond',serif;font-size:1.6rem;font-weight:700;color:#fff;line-height:1.2;letter-spacing:0.01em;}
.header-sub{font-size:.8rem;color:rgba(255,255,255,.65);letter-spacing:.07em;text-transform:uppercase;margin-top:5px;}
.header-divider{width:1px;height:56px;background:rgba(201,150,58,.4);flex-shrink:0;}
.header-roster{flex-shrink:0;text-align:right;}
.header-roster-title{font-family:'EB Garamond',serif;font-size:1.1rem;color:var(--gold-light);font-style:italic;}
.header-roster-sub{font-size:.74rem;color:rgba(255,255,255,.5);margin-top:3px;letter-spacing:.06em;}

/* ── TOOLBAR (search + print) ── */
.toolbar{max-width:1200px;margin:20px auto 0;padding:0 32px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.search-wrap{flex:1;min-width:220px;position:relative;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--maroon-light);pointer-events:none;}
#searchInput{width:100%;padding:10px 16px 10px 40px;border:1.5px solid var(--border-strong);border-radius:10px;font-family:'Outfit',sans-serif;font-size:.88rem;background:#fff;color:var(--text-dark);outline:none;transition:border-color .15s;}
#searchInput:focus{border-color:var(--maroon);box-shadow:0 0 0 3px rgba(107,15,26,.12);}
#searchInput::placeholder{color:var(--text-muted);}
#clearBtn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:1rem;display:none;padding:2px 4px;}
#clearBtn:hover{color:var(--maroon);}
.print-btn{display:flex;align-items:center;gap:7px;background:var(--maroon);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-family:'Outfit',sans-serif;font-size:.87rem;font-weight:600;cursor:pointer;transition:background .15s;}
.print-btn:hover{background:var(--maroon-mid);box-shadow:var(--shadow-sm);}

/* Search results */
.search-results{max-width:1200px;margin:14px auto 0;padding:0 32px;display:none;}
.sr-inner{background:#fff;border:1.5px solid var(--border-strong);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm);}
.sr-header{background:var(--maroon-tint);padding:10px 18px;font-size:.72rem;font-weight:700;color:var(--maroon);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);}
.sr-item{padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:grid;grid-template-columns:90px 1fr;gap:8px;align-items:start;}
.sr-item:last-child{border-bottom:none;}
.sr-item:hover{background:var(--maroon-tint);}
.sr-date{font-size:.75rem;font-weight:700;color:var(--maroon);line-height:1.4;}
.sr-detail{font-size:.82rem;color:var(--text-dark);}
.sr-detail mark{background:rgba(201,150,58,.3);color:var(--text-dark);padding:0 2px;border-radius:2px;}
.sr-empty{padding:18px;text-align:center;color:var(--text-muted);font-style:italic;font-size:.85rem;}

/* ── TODAY / TOMORROW ── */
.dashboard{max-width:1200px;margin:20px auto 0;padding:0 32px;display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.dash-card{background:#fff;border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-md);position:relative;}
.dash-card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--maroon) 0%,var(--maroon-light) 100%);}
.dash-card-head{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--maroon-tint);}
.dash-label{font-family:'EB Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--maroon);}
.dash-date-badge{background:var(--maroon);color:#fff;font-size:.68rem;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;}
.dash-body{padding:14px 20px 18px;}
.dash-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--maroon-pale);align-items:flex-start;}
.dash-row:last-child{border-bottom:none;}
.dash-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;margin-top:1px;}
.icon-t{background:rgba(107,15,26,.08);} .icon-dr{background:rgba(201,150,58,.12);} .icon-c{background:rgba(107,15,26,.06);} .icon-i{background:rgba(107,15,26,.06);}
.dash-key{font-size:.67rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px;}
.dash-val{font-size:.85rem;color:var(--text-dark);font-weight:500;line-height:1.4;}
.dash-val strong{color:var(--maroon);}
.rc-sm{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:12px;background:var(--maroon-pale);border:1px solid var(--border-strong);color:var(--maroon);margin:2px 2px 0 0;}
.dash-holiday{padding:22px;text-align:center;color:var(--text-muted);font-style:italic;font-family:'EB Garamond',serif;font-size:1rem;}

/* ── LEGEND ── */
.legend-bar{max-width:1200px;margin:18px auto 0;padding:0 32px;}
.legend-inner{background:#fff;border:1px solid var(--border);border-radius:10px;padding:11px 18px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.72rem;font-weight:500;color:var(--text-mid);}
.leg-dot{width:9px;height:9px;border-radius:50%;}
.ld-opd{background:#1d6db5;} .ld-er{background:#c0392b;} .ld-lec{background:#2e7d32;}
.ld-cpc{background:#6a1e8a;} .ld-hol{background:#9a6070;} .ld-wrd{background:var(--gold);}

/* ── CALENDAR ── */
.cal-wrap{max-width:1200px;margin:20px auto 48px;padding:0 32px;}
.month-block{margin-bottom:34px;}
.month-lbl{font-family:'EB Garamond',serif;font-size:1.35rem;font-weight:700;color:var(--maroon-deep);padding:10px 0 8px;border-bottom:2px solid var(--maroon);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.month-lbl::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.wk-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px;}
.wk-hdr-cell{text-align:center;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--maroon);padding:6px 0;background:var(--maroon-pale);border-radius:5px;}
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}

.dc{background:#fff;border:1px solid var(--border);border-radius:8px;min-height:98px;padding:7px 8px 8px;cursor:pointer;transition:all .18s ease;position:relative;overflow:hidden;}
.dc:hover{border-color:var(--maroon);box-shadow:var(--shadow-md);transform:translateY(-2px);z-index:2;}
.dc.today{border-color:var(--gold);border-width:2px;box-shadow:0 0 0 3px rgba(201,150,58,.18),var(--shadow-md);}
.dc.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
.dc.hol{background:#fdf6f7;border-color:#e8d0d3;} .dc.cpc{background:#faf4fd;border-color:#c9a8df;} .dc.wrd{background:#fef9ee;border-color:#e8c96a;}
.dc.dimmed{opacity:.25;}
.dc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:8px 0 0 8px;}
.dc.has-both::before{background:linear-gradient(180deg,#1d6db5 50%,#c0392b 50%);}
.dc.has-opd::before{background:#1d6db5;} .dc.has-er::before{background:#c0392b;} .dc.has-lec::before{background:#2e7d32;}
.dc.hol::before{background:#d4aab0;} .dc.cpc::before{background:#8b2bbf;} .dc.wrd::before{background:var(--gold);}
.dn-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.dn{font-family:'EB Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--maroon-deep);line-height:1;}
.dc.today .dn{background:var(--maroon);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;}
.dw{font-size:.57rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);background:var(--maroon-pale);padding:1px 5px;border-radius:3px;}
.pr{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px;}
.pl{font-size:.54rem;font-weight:700;padding:2px 5px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;}
.p-opd{background:#dbeafe;color:#1e40af;} .p-er{background:#fee2e2;color:#991b1b;} .p-lec{background:#dcfce7;color:#166534;}
.p-cpc{background:#f3e8ff;color:#6b21a8;} .p-hol{background:#f1e4e6;color:#7c3040;} .p-wrd{background:#fef3c7;color:#92400e;}
.ct{font-size:.61rem;color:var(--text-mid);font-weight:500;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px;}
.cr-cell{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;}
.crc{font-size:.55rem;font-weight:700;padding:1px 4px;border-radius:9px;background:var(--maroon-pale);border:1px solid var(--border-strong);color:var(--maroon);}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(74,10,18,.55);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.overlay.on{display:flex;}
.modal{background:#fff;border-radius:18px;width:100%;max-width:740px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .22s ease;border-top:5px solid var(--maroon);}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.mh{padding:20px 26px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.mwd{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--maroon-light);margin-bottom:3px;}
.mdt{font-family:'EB Garamond',serif;font-size:1.45rem;font-weight:700;color:var(--maroon-deep);}
.cbtn{background:var(--maroon-pale);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;color:var(--maroon);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cbtn:hover{background:var(--maroon);color:#fff;}
.mb{padding:20px 26px 28px;}
.m-sec{font-size:.63rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--maroon);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.m-sec:first-child{margin-top:0;}
.m-row{display:grid;grid-template-columns:155px 1fr;gap:8px 14px;font-size:.82rem;padding:7px 0;border-bottom:1px solid #f0e4e6;align-items:start;}
.m-row:last-child{border-bottom:none;}
.m-lbl{color:var(--text-muted);font-weight:500;font-size:.79rem;} .m-val{color:var(--text-dark);} .m-val strong{color:var(--maroon-deep);font-weight:600;}
.bdg-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.bdg{font-size:.72rem;font-weight:600;padding:4px 12px;border-radius:20px;}
.b-opd{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe;} .b-er{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;}
.b-hol{background:#f1e4e6;color:#7c3040;border:1px solid #e2c8cb;} .b-cpc{background:#f3e8ff;color:#6b21a8;border:1px solid #e9d5ff;}
.b-wrd{background:#fef3c7;color:#92400e;border:1px solid #fde68a;} .b-lec{background:#dcfce7;color:#166534;border:1px solid #bbf7d0;}
.apanel{background:var(--off-white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:8px;}
.ap-hdr{font-size:.63rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:8px 14px;display:flex;align-items:center;gap:6px;}
.ap-opd{background:#dbeafe;color:#1e3a8a;border-bottom:1px solid #bfdbfe;} .ap-er{background:#fee2e2;color:#7f1d1d;border-bottom:1px solid #fecaca;}
.ap-row{display:grid;grid-template-columns:120px 1fr;font-size:.79rem;padding:7px 14px;border-top:1px solid var(--border);}
.ap-row:first-of-type{border-top:none;} .ap-loc{color:var(--text-muted);font-weight:500;} .ap-val{color:var(--text-dark);}
.roll-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.rc-lg{font-size:.76rem;font-weight:700;padding:3px 12px;border-radius:20px;background:var(--maroon-pale);border:1px solid var(--border-strong);color:var(--maroon);}
.ic-box{background:linear-gradient(135deg,var(--maroon-pale) 0%,#fff 100%);border:1px solid var(--border-strong);border-left:4px solid var(--maroon);border-radius:8px;padding:12px 16px;margin-top:6px;}
.ic-lbl{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:5px;}
.ic-val{font-size:.88rem;font-weight:600;color:var(--maroon-deep);}
.gtbl{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:8px;border-radius:8px;overflow:hidden;}
.gtbl th{background:var(--maroon);color:#fff;font-weight:600;text-align:left;padding:8px 12px;font-size:.67rem;letter-spacing:.06em;text-transform:uppercase;}
.gtbl td{padding:7px 12px;border-bottom:1px solid var(--border);}
.gtbl tr:last-child td{border-bottom:none;} .gtbl tr:nth-child(even) td{background:var(--maroon-tint);}

/* ── PRINT ── */
@media print {
  .toolbar,.legend-bar,.overlay,#searchResults{display:none!important;}
  .site-header{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .dashboard{grid-template-columns:1fr 1fr;}
  .dc{page-break-inside:avoid;min-height:unset;box-shadow:none!important;transform:none!important;}
  .month-block{page-break-inside:avoid;}
  body{background:#fff;}
}

::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:var(--maroon-pale);} ::-webkit-scrollbar-thumb{background:var(--maroon-light);border-radius:3px;}

@media(max-width:768px){
  .header-inner{padding:16px 16px 20px;gap:14px;} .header-logo{width:62px;height:62px;} .header-logo img{width:56px;height:56px;}
  .header-institution{font-size:1.1rem;} .header-divider,.header-roster{display:none;}
  .toolbar,.dashboard,.legend-bar,.cal-wrap{padding:0 14px;}
  .dashboard{grid-template-columns:1fr;}
  .mh,.mb{padding-left:14px;padding-right:14px;}
  .m-row{grid-template-columns:1fr;gap:2px;} .dc{min-height:72px;padding:5px 6px;}
}
</style>
</head>

function buildSearchIndex(){
  const idx=[];
  Object.entries(ROSTER).forEach(([key,row])=>{
    const d=row.date;
    if(d<RSTART||d>REND)return;
    const parts=[];
    if(row.topic)parts.push(row.topic);
    if(row.mc)parts.push(row.mc);
    if(row.ec)parts.push(row.ec);
    if(row.sr)parts.push(row.sr);
    const cp=CP[key];if(cp)cp.forEach(r=>parts.push(String(r)));
    const ic=INCHARGE[d.getDay()]||[];ic.forEach(r=>parts.push(String(r)));
    // also group rolls
    Object.entries(GROUPS).forEach(([,rolls])=>rolls.forEach(r=>parts.push(String(r))));
    idx.push({key,row,parts,cp,ic,d});
  });
  return idx;
}
const SEARCH_IDX=buildSearchIndex();

function highlight(text,q){
  if(!q)return text;
  const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
  return text.replace(re,'<mark></mark>');
}

function doSearch(q){
  q=q.trim();
  if(!q){srDiv.style.display='none';clearBtn.style.display='none';document.querySelectorAll('.dc').forEach(el=>el.classList.remove('dimmed'));return;}
  clearBtn.style.display='block';
  const ql=q.toLowerCase();
  const hits=SEARCH_IDX.filter(item=>item.parts.some(p=>p.toLowerCase().includes(ql)));
  const hitKeys=new Set(hits.map(h=>h.key));
  document.querySelectorAll('.dc[data-key]').forEach(el=>{
    el.classList.toggle('dimmed',!hitKeys.has(el.dataset.key));
  });
  if(!hits.length){srInner.innerHTML=`<div class="sr-empty">No results found for "<strong>${q}</strong>"</div>`;srDiv.style.display='block';return;}
  let html=`<div class="sr-header">${hits.length} result${hits.length!==1?'s':''} for "${q}"</div>`;
  hits.slice(0,20).forEach(({key,row,cp,ic})=>{
    const dFmt=row.date.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    const details=[];
    if(row.topic)details.push(highlight(row.topic,q));
    if(row.mc&&!row.mc.startsWith('OPD'))details.push(highlight(row.mc,q));
    if(row.sr)details.push(highlight(row.sr,q));
    if(cp){const ms=cp.filter(r=>String(r).toLowerCase().includes(ql));if(ms.length)details.push('Case: '+ms.map(r=>highlight(String(r),q)).join(', '));}
    if(ic){const ms=ic.filter(r=>String(r).toLowerCase().includes(ql));if(ms.length)details.push('Incharge: '+ms.map(r=>highlight(String(r),q)).join(', '));}
    html+=`<div class="sr-item" onclick="showM('${key}');srDiv.style.display='none'">
      <div class="sr-date">${dFmt}<br><span style="font-size:.65rem;color:var(--text-muted)">${row.day}</span></div>
      <div class="sr-detail">${details.join(' &nbsp;·&nbsp; ')}</div>
    </div>`;
  });
  if(hits.length>20)html+=`<div class="sr-empty">…and ${hits.length-20} more. Refine your search.</div>`;
  srInner.innerHTML=html;srDiv.style.display='block';
}

searchInp.addEventListener('input',e=>doSearch(e.target.value));

    }else{
      b+=`<div class="m-row"><div class="m-lbl">Topic</div><div class="m-val"><strong>${topic}</strong></div></div>`;
      if(row.mc)b+=`<div class="m-row"><div class="m-lbl">Speaker</div><div class="m-val">${row.mc}</div></div>`;
    }
    if(cp){
      b+=`<div class="m-sec" style="margin-top:14px"><span>📋</span>Case Presentation (Morning)</div>`;
      b+=`<p style="font-size:.76rem;color:var(--text-muted);margin-bottom:8px">Students preparing the case presentation:</p>`;
      b+=`<div class="roll-chips">`;cp.forEach(r=>{b+=`<span class="rc-lg">${r}</span>`;});b+=`</div>`;
    }
    // EVENING
    b+=`<div class="m-sec"><span>🌙</span>Evening Class &nbsp;(02:00 PM – 05:00 PM)</div>`;
    if(tu.includes('ER')){
      b+=`<div class="m-row"><div class="m-lbl">Activity</div><div class="m-val"><strong>ER</strong></div></div>`;
      if(oe){b+=`<div class="apanel"><div class="ap-hdr ap-er">🚨 ER Location Assignments</div>
        <div class="ap-row"><div class="ap-loc">Bay 3</div><div class="ap-val">Group ${oe.b3} — ${gr(oe.b3)}</div></div>
        <div class="ap-row"><div class="ap-loc">Bay 4</div><div class="ap-val">Group ${oe.b4} — ${gr(oe.b4)}</div></div>
        <div class="ap-row"><div class="ap-loc">ICU</div><div class="ap-val">Groups ${oe.icu} — ${oe.icu.split(',').map(g=>gr(+g.trim())).join(' + ')}</div></div>
      </div>`;}
      if(row.ec&&row.ec!=='ER (Bay 3, Bay 4, ICU)'&&!row.ec.startsWith('ER')){
        b+=`<div class="m-row" style="margin-top:6px"><div class="m-lbl">Evening Topic</div><div class="m-val">${row.ec}</div></div>`;
      }
      if(row.sr)b+=`<div class="m-row"><div class="m-lbl">Teacher (SR on Duty)</div><div class="m-val"><strong>${row.sr}</strong></div></div>`;
    }else{
      if(row.ec)b+=`<div class="m-row"><div class="m-lbl">Topic</div><div class="m-val"><strong>${row.ec}</strong></div></div>`;
      if(row.sr)b+=`<div class="m-row"><div class="m-lbl">Teacher (SR on Duty)</div><div class="m-val"><strong>${row.sr}</strong></div></div>`;
    }
    // GROUP REF (Mon+Thu only)
    if(isMonThu(d)){
      b+=`<div class="m-sec"><span>👥</span>Group Reference</div>`;
      b+=`<table class="gtbl"><tr><th>Group</th><th>Roll Numbers</th></tr>`;
      Object.entries(GROUPS).forEach(([g,rolls])=>{b+=`<tr><td>Group ${g}</td><td>${rolls.join(', ')}</td></tr>`;});
      b+=`</table>`;
    }
    // INCHARGE
    if(ic.length){
      b+=`<div class="m-sec"><span>🎓</span>Student Incharge</div>`;
      b+=`<div class="ic-box"><div class="ic-lbl">Roll Number(s) on Duty Today</div><div class="ic-val">${ic.join(' · ')}</div></div>`;
    }
  }
  document.getElementById('mBody').innerHTML=b;
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeM(){document.getElementById('overlay').classList.remove('on');document.body.style.overflow='';}
function ovClick(e){if(e.target===document.getElementById('overlay'))closeM();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});
</script>
</body>
</html>

    const r=ROSTER[k];
    const match = !t || r?.topic?.toLowerCase().includes(t) || r?.mc?.toLowerCase().includes(t) || r?.sr?.toLowerCase().includes(t) || CP[k]?.some(n=>n.toString().includes(t)) || INCHARGE[new Date(k).getDay()]?.some(n=>n.toString().includes(t));
    c.style.opacity = match ? "1" : "0.15";
    c.classList.toggle('search-match', !!t && match);
  });
});

  /* Search & Controls */

    padding: 14px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 50;
    flex-wrap: wrap;
  }
  .search-input {
    flex: 1;
    min-width: 200px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 15px;
    color: var(--text);
    font-size: 0.9rem;
  }
  .btn-print {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;

  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .d-opd{background:var(--accent);} .d-er{background:var(--red);} .d-lec{background:var(--green);}
  .d-cpc{background:var(--purple);} .d-hol{background:var(--muted);} .d-wrd{background:var(--gold);}

  .cal-wrap{padding:24px 32px 40px;}
  .month-lbl{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--accent2);margin:28px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--border);letter-spacing:.04em;}

  .wk-hdr-cell{text-align:center;font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:6px 0;}
  .wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px;}

  .dc{background:#fff;border:1px solid var(--border);border-radius:8px;min-height:90px;padding:8px;cursor:pointer;transition: all 0.2s;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .dc:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(37,99,235,.15);z-index:1;}

  .dc.hol{background:#f5f5f5;border-color:#d0d0d0;}
  .dc.cpc{border-color:var(--purple);background:#faf7ff;}
  .dc.wrd{border-color:var(--gold);background:#fffbf0;}

  .dn{font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;}
  .wt{font-size:.6rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:1px 5px;border-radius:3px;background:#f0f0f0;color:var(--muted);}
  .pr{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
  .pl{font-size:.56rem;font-weight:700;padding:2px 5px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase;}

  .p-cpc{background:#f3e8ff;color:#581c87;} .p-hol{background:#f0f0f0;color:#404040;}

  .ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px;}

  .mh{padding:22px 28px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .mwd{font-size:.72rem;color:var(--accent2);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
  .mdt{font-family:'Playfair Display',serif;font-size:1.4rem;color:#000;line-height:1.2;}
  .cbtn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.4rem;line-height:1;padding:4px;transition:color .15s;flex-shrink:0;}

  .mb{padding:20px 28px 28px;}

  .ir{display:grid;grid-template-columns:155px 1fr;gap:8px 12px;font-size:.82rem;padding:7px 0;border-bottom:1px solid #e5e5e5;align-items:start;}
  .il{color:var(--muted);font-weight:500;} .iv{color:var(--text);} .iv strong{color:#000;}

  .apanel{background:#f9f9f9;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:8px;}
  .ap-hdr{font-size:.63rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:8px 12px;display:flex;align-items:center;gap:6px;}
  .ap-opd{background:#dbeafe;color:#1e40af;}

  .ap-loc{color:var(--muted);font-weight:500;} .ap-val{color:var(--text);}

  .roll-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .rc{font-size:.76rem;font-weight:700;padding:3px 11px;border-radius:20px;background:#fff7ed;border:1px solid #fed7aa;color:#92400e;}

  .gtbl{width:100%;border-collapse:collapse;font-size:.77rem;margin-top:8px;}
  .gtbl th{background:#dbeafe;color:var(--accent);font-weight:600;text-align:left;padding:7px 10px;font-size:.67rem;letter-spacing:.06em;text-transform:uppercase;}
  .gtbl td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text);}

  /* Print Media Styles */
  @media print {
    .controls-bar, .legend, header::before, .cbtn { display: none !important; }

    .dn, .wt, .ct, .month-lbl { color: black !important; }

    .cal-wrap { padding: 10px !important; }

    .mh,.mb{padding-left:14px;padding-right:14px;}
    .ir{grid-template-columns:1fr;gap:2px;}
    .controls-bar { padding: 10px; }
  }
</style>
</head>

function s2d(s){return new Date(new Date(1899,11,30).getTime()+s*86400000);}
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function ttype(t){
  if(!t) return 'normal';
  const u=t.toUpperCase();
  if(u==='HOLIDAY') return 'hol';
  if(u==='CPC')     return 'cpc';
  if(u==='WARD TEST') return 'wrd';
  if(u.includes('OPD')||u.includes('ER')) return 'opd';
  return 'lec';
}

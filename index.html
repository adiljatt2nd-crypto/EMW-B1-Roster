            --maroon: #6b0f1a;
            --maroon-deep: #4a0a12;
            --maroon-mid: #8b1a28;
            --maroon-light: #b03045;
            --maroon-pale: #f5e8ea;
            --maroon-tint: #fdf0f2;
            --gold: #c9963a;
            --gold-light: #e8b95a;
            --white: #ffffff;
            --off-white: #fafafa;
            --border: #e2c8cb;
            --border-strong:#c9a0a6;
            --text-dark: #2a0a10;
            --text-mid: #6b2030;
            --text-muted: #9a6070;
            --shadow-sm: 0 2px 8px rgba(107,15,26,.10);

        body { font-family: 'Outfit', sans-serif; background: var(--off-white); color: var(--text-dark); min-height: 100vh; }

        .site-header { background: var(--maroon-deep); position: relative; overflow: hidden; padding: 0; }
        .header-inner { position: relative; z-index: 1; display: flex; align-items: center; gap: 28px; padding: 20px 40px; max-width: 1200px; margin: 0 auto; }
        .header-logo { width: 90px; height: 90px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(0,0,0,0.3)); }
        .header-text { flex: 1; }
        .header-institution { font-family: 'EB Garamond', serif; font-size: 1.55rem; font-weight: 700; color: #fff; line-height: 1.2; }
        .header-sub { font-size: .82rem; color: rgba(255,255,255,.65); letter-spacing: .08em; text-transform: uppercase; margin-top: 4px; }
        
        /* ── TOOLS (Search & Print) ─────────────────────────── */
        .tools-bar { max-width: 1200px; margin: 20px auto 0; padding: 0 32px; display: flex; gap: 15px; align-items: center; }
        .search-wrapper { flex: 1; position: relative; }
        .search-input { width: 100%; padding: 12px 20px 12px 45px; border-radius: 12px; border: 1px solid var(--border); background: var(--white); font-family: 'Outfit', sans-serif; font-size: 0.95rem; }
        .search-input:focus { border-color: var(--gold); outline: none; }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .print-btn { background: var(--maroon); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
        .print-btn:hover { background: var(--maroon-mid); }

        /* ── DASHBOARD ─────────────────────────────── */
        .dashboard { max-width: 1200px; margin: 20px auto 0; padding: 0 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .dash-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-md); position: relative; transition: opacity 0.3s; }
        .dash-card.hidden { display: none; }
        .dash-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, var(--maroon) 0%, var(--maroon-light) 100%); }
        .dash-card-head { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--maroon-tint); }
        .dash-label { font-family: 'EB Garamond', serif; font-size: 1.15rem; font-weight: 600; color: var(--maroon); }
        .dash-date-badge { background: var(--maroon); color: var(--white); font-size: .7rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; letter-spacing: .06em; text-transform: uppercase; }
        .dash-body { padding: 18px 22px 20px; }
        .dash-row { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--maroon-pale); align-items: flex-start; }
        .dash-row:last-child { border-bottom: none; }
        .dash-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: .9rem; flex-shrink: 0; }
        .icon-topic { background: rgba(107,15,26,.08); }
        .icon-teacher { background: rgba(201,150,58,.12); }
        .icon-case { background: rgba(107,15,26,.06); }
        .dash-key { font-size: .7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 2px; }
        .dash-val { font-size: .88rem; color: var(--text-dark); font-weight: 500; line-height: 1.4; }
        .roll-chip-sm { display: inline-block; font-size: .72rem; font-weight: 600; padding: 2px 8px; border-radius: 12px; background: var(--maroon-pale); border: 1px solid var(--border-strong); color: var(--maroon); margin-right: 3px; }
        .dash-holiday { padding: 24px; text-align: center; color: var(--text-muted); font-style: italic; font-family: 'EB Garamond', serif; }

        /* ── CALENDAR ────────────────────────────────────────── */
        .legend-bar { max-width: 1200px; margin: 24px auto 0; padding: 0 32px; }
        .legend-inner { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
        .leg-item { display: flex; align-items: center; gap: 6px; font-size: .74rem; font-weight: 500; color: var(--text-mid); }
        .leg-dot { width: 10px; height: 10px; border-radius: 50%; }
        .ld-opd { background: #1d6db5; } .ld-er { background: #c0392b; } .ld-lec { background: #2e7d32; } .ld-cpc { background: #6a1e8a; } .ld-hol { background: #9a6070; } .ld-wrd { background: var(--gold); }
        .ld-both { background: linear-gradient(135deg,#1d6db5 50%,#c0392b 50%); }

        .cal-wrap { max-width: 1200px; margin: 24px auto 48px; padding: 0 32px; }
        .month-block { margin-bottom: 36px; }
        .month-lbl { font-family: 'EB Garamond', serif; font-size: 1.4rem; font-weight: 700; color: var(--maroon-deep); padding: 10px 0 8px; border-bottom: 2px solid var(--maroon); margin-bottom: 12px; }
        .wk-hdr { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; margin-bottom: 5px; }
        .wk-hdr-cell { text-align: center; font-size: .67rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--maroon); padding: 6px 0; background: var(--maroon-pale); border-radius: 4px; }
        .wk-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }
        .dc { background: var(--white); border: 1px solid var(--border); border-radius: 8px; min-height: 96px; padding: 7px 8px 8px; cursor: pointer; transition: all .18s ease; position: relative; overflow: hidden; }
        .dc:hover { border-color: var(--maroon); box-shadow: var(--shadow-md); transform: translateY(-2px); z-index: 2; }
        .dc.today { border-color: var(--gold); border-width: 2px; }
        .dc.empty { background: transparent; border-color: transparent; pointer-events: none; }
        .dc.filtered-out { opacity: 0.15; filter: grayscale(1); pointer-events: none; }
        
        .dc::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; border-radius: 8px 0 0 8px; }
        .dc.has-opd-er::before { background: linear-gradient(180deg, #1d6db5 50%, #c0392b 50%); }
        .dc.has-opd::before { background: #1d6db5; }
        .dc.has-er::before { background: #c0392b; }
        .dc.has-lec::before { background: #2e7d32; }
        .dc.hol::before { background: #d4aab0; }
        .dc.cpc::before { background: #8b2bbf; }
        .dc.wrd::before { background: var(--gold); }

        .day-num-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
        .day-num { font-family: 'EB Garamond', serif; font-size: 1.1rem; font-weight: 700; color: var(--maroon-deep); }
        .day-wd { font-size: .58rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); background: var(--maroon-pale); padding: 1px 5px; border-radius: 3px; }
        .pill-row { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 4px; }
        .pill { font-size: .55rem; font-weight: 700; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; }
        .p-opd { background: #dbeafe; color: #1e40af; } .p-er { background: #fee2e2; color: #991b1b; } .p-lec { background: #dcfce7; color: #166534; } .p-hol { background: #f1e4e6; color: #7c3040; }
        .cell-topic { font-size: .63rem; color: var(--text-mid); font-weight: 500; line-height: 1.35; margin-bottom: 4px; }
        .case-rolls-cell { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 3px; }
        .crc { font-size: .57rem; font-weight: 700; padding: 1px 5px; border-radius: 10px; background: var(--maroon-pale); border: 1px solid var(--border-strong); color: var(--maroon); }

        /* ── MODAL ───────────────────────────────────────────── */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(74,10,18,.55); z-index: 200; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(3px); }
        .overlay.on { display: flex; }
        .modal { background: var(--white); border-radius: 18px; width: 100%; max-width: 740px; max-height: 92vh; overflow-y: auto; border-top: 5px solid var(--maroon); position: relative; }
        .modal-header { padding: 22px 28px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .modal-date { font-family: 'EB Garamond', serif; font-size: 1.5rem; font-weight: 700; color: var(--maroon-deep); }
        .cbtn { background: var(--maroon-pale); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; color: var(--maroon); font-size: 1.2rem; }
        .modal-body { padding: 22px 28px 30px; }
        .m-sec { font-size: .65rem; font-weight: 700; text-transform: uppercase; color: var(--maroon); margin: 22px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .m-row { display: grid; grid-template-columns: 160px 1fr; gap: 8px 14px; font-size: .84rem; padding: 7px 0; border-bottom: 1px solid #f0e4e6; }
        .m-lbl { color: var(--text-muted); font-weight: 500; }
        .badge-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
        .badge { font-size: .74rem; font-weight: 600; padding: 4px 14px; border-radius: 20px; }
        .b-opd { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .b-er { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        /* ── PRINT STYLES ──────────────────────────────────── */
        @media print {
            .tools-bar, .site-header::after, .cbtn, .overlay { display: none !important; }
            body { background: white; }
            .cal-wrap, .dashboard { margin: 0; padding: 0; max-width: 100%; }
            .month-block { page-break-inside: avoid; }
            .dc { border: 1px solid #ccc !important; }
            .dc.filtered-out { opacity: 1 !important; filter: none !important; }
            .header-inner { color: black !important; padding: 10px 0; }
            .header-institution { color: black !important; }
            .header-logo { filter: grayscale(1); }
        }

        @media (max-width: 768px) {
            .header-inner { padding: 20px; gap: 16px; }
            .header-logo { width: 60px; height: 60px; }
            .header-institution { font-size: 1.1rem; }
            .dashboard { grid-template-columns: 1fr; padding: 0 16px; }
            .tools-bar { flex-direction: column; padding: 0 16px; }
            .print-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>

    let allEvents = {};
    let searchTerm = '';

    function getDateKey(d) { return d.toISOString().split('T')[0]; }
    function getWeekday(d) { return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]; }
    function getMonthName(m) { return ['January','February','March','April','May','June','July','August','September','October','November','December'][m]; }

    function buildEventIndex() {
        allEvents = {};
        let idx = 0;
        for(let d=new Date(2026,3,1); d<new Date(2026,6,1); d.setDate(d.getDate()+1)) {
            let dk = getDateKey(new Date(d));
            allEvents[dk] = RAW[idx] || {};
            idx++;
        }
    }

    function renderDayCell(date) {
        let dk = getDateKey(date);
        let ev = allEvents[dk] || {topic:'',mc:'',ec:'',sr:''};
        let dayNum = date.getDate();
        let wd = getWeekday(date);
        let isToday = dk === getDateKey(new Date());
        
        let isFiltered = searchTerm && !(
            ev.topic.toLowerCase().includes(searchTerm) ||
            ev.mc.toLowerCase().includes(searchTerm) ||
            ev.ec.toLowerCase().includes(searchTerm) ||
            (String(dayNum).includes(searchTerm))
        );

        let cls = 'dc';
        if(isToday) cls += ' today';
        if(isFiltered) cls += ' filtered-out';
        if(!ev.topic) cls += ' empty';
        
        if(ev.topic === 'HOLIDAY') cls += ' hol';
        else if(ev.topic === 'CPC') cls += ' cpc';
        else if(ev.topic.includes('OPD + ER')) cls += ' has-opd-er';
        else if(ev.topic.includes('OPD')) cls += ' has-opd';
        else if(ev.topic.includes('ER')) cls += ' has-er';
        else if(ev.topic.includes('Ward')) cls += ' wrd';
        else if(ev.topic) cls += ' has-lec';

        let html = `<div class="${cls}" onclick="openDay('${dk}')">
            <div class="day-num-row">
                <span class="day-num">${dayNum}</span>
                <span class="day-wd">${wd}</span>
            </div>`;
        
        if(ev.topic === 'HOLIDAY') {
            html += '<div class="pill-row"><span class="pill p-hol">Holiday</span></div>';
        } else if(ev.topic === 'CPC') {
            html += '<div class="pill-row"><span class="pill" style="background:#f3e5f5;color:#4a148c;">CPC</span></div>';
        } else if(ev.topic) {
            let pills = [];
            if(ev.topic.includes('OPD + ER')) pills.push('<span class="pill p-opd">OPD</span><span class="pill p-er">ER</span>');
            else if(ev.topic.includes('OPD')) pills.push('<span class="pill p-opd">OPD</span>');
            else if(ev.topic.includes('ER')) pills.push('<span class="pill p-er">ER</span>');
            else if(ev.topic.includes('Ward')) pills.push('<span class="pill p-lec">Ward</span>');
            else pills.push('<span class="pill p-lec">Lecture</span>');
            
            html += `<div class="pill-row">${pills.join('')}</div>`;
            html += `<div class="cell-topic">${ev.topic}</div>`;
        }
        
        html += '</div>';
        return html;
    }

    function buildCalendar() {
        buildEventIndex();
        let wrap = document.getElementById('calWrap');
        wrap.innerHTML = '';
        
        for(let m=3; m<6; m++) {
            let mb = document.createElement('div');
            mb.className = 'month-block';
            
            let ml = document.createElement('div');
            ml.className = 'month-lbl';
            ml.textContent = getMonthName(m) + ' 2026';
            mb.appendChild(ml);
            
            let wh = document.createElement('div');
            wh.className = 'wk-hdr';
            ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
                let c = document.createElement('div');
                c.className = 'wk-hdr-cell';
                c.textContent = d;
                wh.appendChild(c);
            });
            mb.appendChild(wh);
            
            let wg = document.createElement('div');
            wg.className = 'wk-grid';
            
            let fd = new Date(2026, m, 1);
            let sw = fd.getDay();
            for(let i=0; i<sw; i++) {
                let ec = document.createElement('div');
                ec.className = 'dc empty';
                wg.appendChild(ec);
            }
            
            let md = new Date(2026, m+1, 0).getDate();
            for(let d=1; d<=md; d++) {
                let dc = document.createElement('div');
                dc.innerHTML = renderDayCell(new Date(2026, m, d));
                wg.appendChild(dc.firstChild);
            }
            
            mb.appendChild(wg);
            wrap.appendChild(mb);
        }
    }

    function handleSearch() {
        searchTerm = document.getElementById('searchInput').value.toLowerCase();
        buildCalendar();
    }

    function openDay(dk) {
        let ev = allEvents[dk];
        if(!ev.topic) return;
        
        let d = new Date(dk);
        document.getElementById('mDt').textContent = d.getDate() + ' ' + getMonthName(d.getMonth());
        document.getElementById('mWd').textContent = getWeekday(d);
        
        let html = '';
        if(ev.topic === 'HOLIDAY') {
            html = '<div class="dash-holiday">Holiday - No Activities</div>';
        } else if(ev.topic === 'CPC') {
            html = '<div class="m-sec">📋 CPC Session</div>';
        } else {
            html += '<div class="m-sec">📚 Topic</div>';
            html += `<div class="m-row"><div class="m-lbl">Subject</div><div>${ev.topic}</div></div>`;
            
            html += '<div class="m-sec">👨‍🏫 Main Course</div>';
            html += `<div class="m-row"><div class="m-lbl">Instructor</div><div>${ev.mc}</div></div>`;
            
            html += '<div class="m-sec">🔬 Examination / Practical</div>';
            html += `<div class="m-row"><div class="m-lbl">Activity</div><div>${ev.ec}</div></div>`;
            
            html += '<div class="m-sec">👨‍⚕️ Senior Resident</div>';
            html += `<div class="m-row"><div class="m-lbl">SR</div><div>${ev.sr}</div></div>`;
        }
        
        document.getElementById('mBody').innerHTML = html;
        document.getElementById('overlay').classList.add('on');
    }

    function closeM() {
        document.getElementById('overlay').classList.remove('on');
    }

    function ovClick(e) {
        if(e.target === e.currentTarget) closeM();
    }

    window.addEventListener('keydown', (e) => {
        if(e.key === 'Escape') closeM();
    });

    buildCalendar();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EMW Roster - Batch B1</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22EMW%20Roster%22,%22short_name%22:%22EMW%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%233b82f6%22}">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f8fafc; --surface:#ffffff; --border:#e2e8f0;
    --accent:#2563eb; --text:#1e293b; --muted:#64748b;
    --opd:#dbeafe; --er:#fee2e2; --lec:#dcfce7; --cpc:#f3e8ff; --hol:#f1f5f9; --wrd:#fef3c7;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;}

  header{background:white;border-bottom:1px solid var(--border);padding:20px 24px;text-align:center;}
  header h1{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--accent);}
  header p{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

  .controls{padding:15px 24px;background:white;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;flex-direction:column;gap:10px;}
  .search-wrap{display:flex;gap:8px;}
  input{flex:1;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:1rem;outline:none;}
  input:focus{border-color:var(--accent);}
  .btn{padding:12px 16px;border-radius:8px;border:none;font-weight:700;cursor:pointer;font-size:.85rem;transition:0.2s;}
  .btn-p{background:var(--accent);color:white;}
  .btn-s{background:#f1f5f9;color:var(--text);display:none;}

  .legend{display:flex;flex-wrap:wrap;gap:8px;padding:12px 24px;background:#fff;border-bottom:1px solid var(--border);font-size:.7rem;font-weight:700;}
  .l-item{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:4px;}

  .cal-wrap{padding:16px;}
  .month-lbl{font-family:'Playfair Display',serif;font-size:1.2rem;margin:20px 0 10px;color:var(--accent);border-left:4px solid var(--accent);padding-left:10px;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px;}
  .day-hdr{text-align:center;font-size:.65rem;font-weight:700;color:var(--muted);padding:5px 0;}
  .cell{background:white;border:1px solid var(--border);border-radius:6px;min-height:85px;padding:6px;cursor:pointer;transition:transform 0.1s;}
  .cell.empty{background:transparent;border:none;}
  .cell:active{transform:scale(0.96);}
  .d-num{font-size:.8rem;font-weight:700;margin-bottom:4px;display:flex;justify-content:space-between;}
  .topic{font-size:.65rem;font-weight:500;line-height:1.2;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  
  /* Color Coding */
  .p-opd{background:var(--opd);} .p-er{background:var(--er);} .p-lec{background:var(--lec);}
  .p-cpc{background:var(--cpc);} .p-hol{background:var(--hol);} .p-wrd{background:var(--wrd);}

  /* Modal */
  .ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;padding:20px;align-items:center;justify-content:center;}
  .ov.on{display:flex;}
  .mo{background:white;border-radius:12px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;padding:20px;}
  .mo h2{font-family:'Playfair Display',serif;margin-bottom:15px;color:var(--accent);}
  .mo-line{padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:.9rem;}
  .mo-label{font-weight:700;font-size:.7rem;color:var(--muted);text-transform:uppercase;}

  /* Print List View (Hidden by default) */
  #printList{display:none;}

  @media print {
    body * { visibility: hidden; }
    #printList, #printList * { visibility: visible; }
    #printList { display: block !important; position: absolute; top: 0; left: 0; width: 100%; }
    .print-item { padding: 10px; border-bottom: 1px solid #000; page-break-inside: avoid; }
    .print-date { font-weight: bold; font-size: 1.1rem; }
  }
</style>
</head>
<body>

<div id="mainUI">
  <header>
    <p>East Medical Ward | KEMU</p>
    <h1>Batch B1 Roster</h1>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search Roll #, Topic, or Dr...">
      <button class="btn btn-p" onclick="window.print()">Print Calendar</button>
    </div>
    <button id="btnSearchPrint" class="btn btn-s" onclick="printSearchList()">Print Search Results</button>
  </div>

  <div class="legend">
    <div class="l-item p-opd">OPD</div>
    <div class="l-item p-er">ER</div>
    <div class="l-item p-lec">Lecture</div>
    <div class="l-item p-cpc">CPC</div>
    <div class="l-item p-wrd">Test</div>
  </div>

  <div class="cal-wrap" id="calWrap"></div>
</div>

<div id="printList"></div>

<div class="ov" id="ov" onclick="if(event.target==this)this.classList.remove('on')">
  <div class="mo" id="mContent"></div>
</div>

<script>
// Data and Roster logic remains consistent with original validated details
const GROUPS = { 1:[11,54,75,76,77], 2:[78,95,111,120], 3:[158,161,162,196,180,241], 4:[245,247,267,286,293,348] };
const CP = { '2026-04-21':[11,54], '2026-04-22':[75,76], '2026-04-24':[77,78], '2026-04-25':[95,111,120], '2026-04-28':[158,161], '2026-04-29':[162,196], '2026-05-02':[280,241], '2026-05-05':[245,247], '2026-05-06':[267,286], '2026-05-08':[293,348], '2026-05-09':[11,54], '2026-05-12':[75,76], '2026-05-13':[77,78], '2026-05-16':[95,111,120], '2026-05-19':[158,161], '2026-05-20':[162,196], '2026-05-22':[180,241], '2026-05-23':[245,247], '2026-05-26':[267,286], '2026-05-27':[293,348], '2026-05-30':[11,54], '2026-06-02':[75,76], '2026-06-03':[77,78], '2026-06-06':[95,111,120], '2026-06-09':[158,161], '2026-06-10':[162,196], '2026-06-12':[180,241] };
// Simplified roster for rendering speed on mobile
const RAW=[{s:46132,t:'OPD',sr:'SR'},{s:46133,t:'History Taking',mc:'Dr Yaser',sr:'Dr Waqar'},{s:46134,t:'UGIB',mc:'Dr Shazia',sr:'Dr Saqib'},{s:46135,t:'OPD'},{s:46136,t:'Ascites',mc:'Dr Bilal',sr:'Dr Nauman'},{s:46137,t:'Jaundice',mc:'Dr Naeem',sr:'Dr Safi'},{s:46138,t:'HOLIDAY'},{s:46139,t:'OPD+ER'},{s:46140,t:'Hepatic Enceph',mc:'Dr Tazeen'},{s:46141,t:'Diarrhoea',mc:'Dr Sidrah'},{s:46142,t:'OPD'},{s:46143,t:'HOLIDAY'},{s:46144,t:'Chest Pain',mc:'Dr Mamoona'},{s:46145,t:'HOLIDAY'},{s:46146,t:'OPD'},{s:46147,t:'Heart Failure',mc:'Dr Uzma'},{s:46148,t:'Valvular Disease',mc:'Dr Tazeen'},{s:46149,t:'OPD+ER'},{s:46150,t:'Endocarditis',mc:'Dr Shazia'},{s:46151,t:'Arrhythmias',mc:'Dr Sidrah'},{s:46152,t:'HOLIDAY'},{s:46153,t:'OPD'},{s:46154,t:'Anemias',mc:'Dr Tazeen'},{s:46155,t:'Lymphoma',mc:'Dr Bilal'},{s:46156,t:'OPD+ER'},{s:46157,t:'CPC'},{s:46158,t:'Diabetes',mc:'Dr Sidrah'},{s:46159,t:'HOLIDAY'},{s:46160,t:'OPD'},{s:46161,t:'DKA / HSS',mc:'Dr Uzma'},{s:46162,t:'Thyroid',mc:'Dr Sidrah'},{s:46163,t:'OPD+ER'},{s:46164,t:'SOB',mc:'Dr Naeem'},{s:46165,t:'Asthma / COPD',mc:'Dr Mamoona'},{s:46166,t:'HOLIDAY'},{s:46167,t:'OPD+ER'},{s:46168,t:'Pneumonia',mc:'Dr Shazia'},{s:46169,t:'TB',mc:'Dr Bilal'},{s:46170,t:'ER+OPD'},{s:46171,t:'Restrictive Disease',mc:'Dr Shazia'},{s:46172,t:'Effusion',mc:'Dr Naeem'},{s:46174,t:'OPD+ER'},{s:46175,t:'Meningitis',mc:'Dr Tazeen'},{s:46176,t:'CVA',mc:'Dr Shazia'},{s:46177,t:'Lesion Localisation',mc:'Dr Mamoona'},{s:46178,t:'CPC'},{s:46179,t:'Arthralgias',mc:'Dr Yaser'},{s:46180,t:'HOLIDAY'},{s:46181,t:'OPD+ER'},{s:46182,t:'Connective Tissue',mc:'Dr Yaser'},{s:46183,t:'Epilepsy',mc:'Dr Bilal'},{s:46184,t:'OPD+ER'},{s:46185,t:'CKI',mc:'Dr Naeem'},{s:46186,t:'WARD TEST'}];

const ROSTER={};
function s2d(s){return new Date(new Date(1899,11,30).getTime()+s*86400000);}
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
RAW.forEach(r=>{const d=s2d(r.s);ROSTER[dk(d)]={...r,date:d};});

const MN=['January','February','March','April','May','June'];
let html='';
[[2026,3],[2026,4],[2026,5]].forEach(([yr,mo])=>{
  html+=`<div class="month-lbl">${MN[mo]} ${yr}</div><div class="grid">`;
  ['S','M','T','W','T','F','S'].forEach(d=>html+=`<div class="day-hdr">${d}</div>`);
  const f=new Date(yr,mo,1), dInM=new Date(yr,mo+1,0).getDate();
  for(let i=0;i<f.getDay();i++) html+=`<div class="cell empty"></div>`;
  for(let d=1;d<=dInM;d++){
    const cur=new Date(yr,mo,d), key=dk(cur);
    if(cur<new Date(2026,3,19)||cur>new Date(2026,5,13)){html+=`<div class="cell empty"></div>`;continue;}
    const r=ROSTER[key], tu=(r?.t||'').toUpperCase();
    let pCls='p-lec';
    if(tu==='HOLIDAY') pCls='p-hol'; else if(tu==='CPC') pCls='p-cpc'; else if(tu==='WARD TEST') pCls='p-wrd';
    else if(tu.includes('OPD')) pCls='p-opd'; else if(tu.includes('ER')) pCls='p-er';
    html+=`<div class="cell ${pCls}" id="d-${key}" onclick="showM('${key}')">
      <div class="d-num">${d} ${CP[key]?'<small>📋</small>':''}</div>
      <div class="topic">${r?.t||''}</div>
    </div>`;
  }
  html+=`</div>`;
});
document.getElementById('calWrap').innerHTML=html;

// Search and Print List Logic
const searchInput = document.getElementById('searchInput');
const btnSearchPrint = document.getElementById('btnSearchPrint');

searchInput.addEventListener('input', e => {
  const t = e.target.value.toLowerCase().trim();
  const matched = [];
  document.querySelectorAll('.cell:not(.empty)').forEach(c => {
    const k = c.id.replace('d-',''), r = ROSTER[k];
    const isMatch = !t || r?.t.toLowerCase().includes(t) || r?.mc?.toLowerCase().includes(t) || CP[k]?.some(n=>n.toString().includes(t));
    c.style.display = isMatch ? "block" : "none";
    if(t && isMatch) matched.push({key:k, ...r});
  });
  btnSearchPrint.style.display = (t && matched.length > 0) ? "block" : "none";
  
  // Prep print list
  let pListHtml = `<h2>Search Results: "${t}"</h2>`;
  matched.forEach(m => {
    pListHtml += `<div class="print-item">
      <div class="print-date">${m.date.toDateString()}</div>
      <div><strong>Topic:</strong> ${m.t}</div>
      ${m.mc?`<div><strong>Speaker:</strong> ${m.mc}</div>`:''}
      ${CP[m.key]?`<div><strong>Case Presentation:</strong> Roll # ${CP[m.key].join(', ')}</div>`:''}
    </div>`;
  });
  document.getElementById('printList').innerHTML = pListHtml;
});

function printSearchList() { window.print(); }

function showM(k){
  const r=ROSTER[k], d=r.date, cp=CP[k];
  let h=`<h2>${d.toDateString()}</h2>`;
  h+=`<div class="mo-line"><span class="mo-label">Topic</span><br><strong>${r.t}</strong></div>`;
  if(r.mc) h+=`<div class="mo-line"><span class="mo-label">Speaker</span><br>${r.mc}</div>`;
  if(r.sr) h+=`<div class="mo-line"><span class="mo-label">SR on Duty</span><br>${r.sr}</div>`;
  if(cp) h+=`<div class="mo-line"><span class="mo-label">📋 Case Presentation</span><br>Roll Numbers: ${cp.join(', ')}</div>`;
  document.getElementById('mContent').innerHTML=h;
  document.getElementById('ov').classList.add('on');
}
</script>
</body>
</html>
